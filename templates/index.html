<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurveyorLink — Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --ink-light: #4a4a6a;
    --cream: #faf8f4;
    --gold: #c9a84c;
    --gold-light: #f0dfa0;
    --orange: #e07b39;
    --orange-light: #fdf0e8;
    --green: #2d7d46;
    --green-light: #e8f5ec;
    --red: #c0392b;
    --red-light: #fdecea;
    --blue: #2563eb;
    --card: #ffffff;
    --border: #e8e4dc;
    --shadow: 0 2px 16px rgba(26,26,46,0.08);
    --shadow-hover: 0 8px 32px rgba(26,26,46,0.16);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ===== TYPOGRAPHY ===== */
  h1, h2, h3 { font-family: 'DM Serif Display', serif; }
  
  /* ===== PAGES ===== */
  .page { display: none; }
  .page.active { display: block; }

  /* ===== AUTH PAGE ===== */
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--ink) 0%, #2d2d5e 100%);
    padding: 24px;
  }

  .auth-container {
    background: var(--card);
    border-radius: 20px;
    width: 100%;
    max-width: 440px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  }

  .auth-header {
    background: linear-gradient(135deg, var(--gold) 0%, var(--orange) 100%);
    padding: 32px;
    text-align: center;
    color: var(--ink);
  }

  .auth-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .auth-tagline {
    font-size: 13px;
    opacity: 0.75;
    font-style: italic;
  }

  .auth-tabs {
    display: flex;
    border-bottom: 2px solid var(--border);
  }

  .auth-tab {
    flex: 1;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    font-weight: 500;
    font-size: 14px;
    color: var(--ink-light);
    border: none;
    background: none;
    transition: all 0.2s;
  }

  .auth-tab.active {
    color: var(--orange);
    border-bottom: 2px solid var(--orange);
    margin-bottom: -2px;
  }

  .auth-body { padding: 28px; }

  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-light);
    margin-bottom: 6px;
  }

  input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--cream);
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--orange);
    background: #fff;
  }

  textarea { resize: vertical; min-height: 80px; }

  select { cursor: pointer; }

  .role-selector {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .role-btn {
    flex: 1;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    background: var(--cream);
    color: var(--ink-light);
    transition: all 0.2s;
  }

  .role-btn.selected {
    border-color: var(--orange);
    background: var(--orange-light);
    color: var(--orange);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-decoration: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--orange), var(--gold));
    color: white;
    width: 100%;
    padding: 14px;
    font-size: 15px;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(224,123,57,0.4); }

  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--ink);
  }

  .btn-outline:hover { border-color: var(--orange); color: var(--orange); }

  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { background: #236038; }

  .btn-red { background: var(--red); color: white; }
  .btn-red:hover { background: #a93226; }

  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { background: #b8943e; }

  .btn-sm { padding: 8px 14px; font-size: 12px; }

  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* ===== MAIN LAYOUT ===== */
  .app-layout {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .navbar {
    background: var(--ink);
    color: white;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: -0.5px;
  }

  .nav-user {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
  }

  .nav-badge {
    background: var(--orange);
    color: white;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .btn-logout {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .btn-logout:hover { background: rgba(255,255,255,0.2); }

  /* ===== TABS NAV ===== */
  .tab-nav {
    background: white;
    border-bottom: 1px solid var(--border);
    display: flex;
    overflow-x: auto;
    padding: 0 24px;
  }

  .tab-nav-item {
    padding: 16px 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-light);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .tab-nav-item.active {
    color: var(--orange);
    border-bottom-color: var(--orange);
  }

  /* ===== CONTENT AREA ===== */
  .content { padding: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }

  /* ===== TAB PANES ===== */
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ===== CARDS ===== */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 24px;
    margin-bottom: 16px;
    transition: box-shadow 0.2s;
  }

  .card:hover { box-shadow: var(--shadow-hover); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    gap: 12px;
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--ink);
  }

  .tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tag-survey { background: #e8f0fe; color: #2563eb; }
  .tag-pending { background: #fef9e7; color: #b8860b; }
  .tag-contacted { background: var(--green-light); color: var(--green); }
  .tag-not-contacted { background: var(--red-light); color: var(--red); }
  .tag-unlocked { background: var(--green-light); color: var(--green); }

  .card-meta {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .meta-item label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ink-light);
    margin-bottom: 3px;
  }

  .meta-item span {
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }

  .phone-blur {
    filter: blur(5px);
    user-select: none;
    color: var(--ink-light);
    font-style: italic;
  }

  .contact-box {
    background: var(--green-light);
    border: 1px solid var(--green);
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 12px;
  }

  .contact-box .contact-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--green);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .contact-box .contact-phone {
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
  }

  /* ===== STATS ROW ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .stat-number {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--orange);
  }

  .stat-label {
    font-size: 12px;
    color: var(--ink-light);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  /* ===== SECTION HEADER ===== */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--ink);
  }

  /* ===== SURVEYORS TABLE ===== */
  .unlock-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 12px;
  }

  .unlock-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--cream);
    border-radius: 8px;
    border: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
  }

  .unlock-surveyor {
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
  }

  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ===== STARS ===== */
  .star-rating {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }

  .star {
    font-size: 28px;
    cursor: pointer;
    color: #d1d5db;
    transition: color 0.15s;
  }

  .star.active { color: var(--gold); }
  .star:hover ~ .star { color: #d1d5db; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    margin-bottom: 20px;
    color: var(--ink);
  }

  /* ===== ALERT ===== */
  .alert {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
  }

  .alert-error { background: var(--red-light); color: var(--red); border: 1px solid #f5c6cb; }
  .alert-success { background: var(--green-light); color: var(--green); border: 1px solid #c3e6cb; }
  .alert-info { background: #e8f0fe; color: var(--blue); border: 1px solid #b8d4f8; }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--ink-light);
  }

  .empty-state-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 20px; margin-bottom: 8px; color: var(--ink); }
  .empty-state p { font-size: 14px; }

  /* ===== LOADING ===== */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== SEARCH ===== */
  .search-bar {
    position: relative;
    margin-bottom: 20px;
  }

  .search-bar input {
    padding-left: 40px;
    background: white;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-light);
    font-size: 16px;
  }

  /* ===== REVIEW CARD ===== */
  .review-card {
    background: var(--cream);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }

  .review-stars { color: var(--gold); font-size: 16px; margin-bottom: 6px; }

  .review-text { font-size: 14px; color: var(--ink); line-height: 1.6; }

  .review-meta { font-size: 12px; color: var(--ink-light); margin-top: 8px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    .content { padding: 16px; }
    .card { padding: 16px; }
    .card-meta { grid-template-columns: 1fr 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .navbar { padding: 0 16px; }
    .tab-nav { padding: 0 12px; }
    .tab-nav-item { padding: 14px 12px; font-size: 13px; }
  }

  /* Form row */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
  }

  /* Badge for unlock count */
  .unlock-count {
    font-size: 12px;
    color: var(--ink-light);
    font-style: italic;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- ===== AUTH PAGE ===== -->
<div id="auth-page" class="page active">
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <div class="auth-logo">🗺 SurveyorLink</div>
        <div class="auth-tagline">India's Survey Professional Marketplace</div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
      </div>

      <div class="auth-body">
        <div id="auth-alert"></div>

        <!-- LOGIN FORM -->
        <div id="login-form">
          <div class="form-group">
            <label>Email or Phone</label>
            <input type="text" id="login-identifier" placeholder="email@example.com or 9876543210">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Your password">
          </div>
          <button class="btn btn-primary" onclick="doLogin()" id="login-btn">Login</button>
        </div>

        <!-- REGISTER FORM -->
        <div id="register-form" style="display:none">
          <div class="form-group">
            <label>I am a...</label>
            <div class="role-selector">
              <div class="role-btn selected" id="role-customer" onclick="selectRole('customer')">
                🏠 Customer
              </div>
              <div class="role-btn" id="role-surveyor" onclick="selectRole('surveyor')">
                📐 Surveyor
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="reg-name" placeholder="Your full name">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="reg-email" placeholder="email@example.com">
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" id="reg-phone" placeholder="9876543210">
            </div>
          </div>
          <div class="form-group" id="company-field" style="display:none">
            <label>Company / Firm Name</label>
            <input type="text" id="reg-company" placeholder="Survey Associates Ltd.">
          </div>
          <div class="form-group">
            <label>Password *</label>
            <input type="password" id="reg-password" placeholder="Min 6 characters">
          </div>
          <button class="btn btn-primary" onclick="doRegister()" id="register-btn">Create Account</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== MAIN APP PAGE ===== -->
<div id="app-page" class="page">
  <div class="app-layout">
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-logo">🗺 SurveyorLink</div>
      <div class="nav-user">
        <span id="nav-username">User</span>
        <span class="nav-badge" id="nav-role">Customer</span>
        <button class="btn-logout" onclick="doLogout()">Logout</button>
      </div>
    </nav>

    <!-- TAB NAV -->
    <div class="tab-nav" id="tab-nav"></div>

    <!-- CONTENT -->
    <div class="content">
      <!-- CUSTOMER TABS -->
      <div id="tab-my-listings" class="tab-pane"></div>
      <div id="tab-create-listing" class="tab-pane"></div>

      <!-- SURVEYOR TABS -->
      <div id="tab-browse-listings" class="tab-pane"></div>
      <div id="tab-my-contacts" class="tab-pane"></div>
      <div id="tab-my-profile" class="tab-pane"></div>
    </div>
  </div>
</div>

<!-- ===== REVIEW MODAL ===== -->
<div class="modal-overlay" id="review-modal">
  <div class="modal">
    <h2 class="modal-title">⭐ Rate this Surveyor</h2>
    <div id="review-modal-alert"></div>
    <input type="hidden" id="review-unlock-id">
    <input type="hidden" id="review-surveyor-name-store">
    <div class="form-group">
      <label>Surveyor: <span id="review-surveyor-name" style="color:var(--ink);font-weight:600"></span></label>
    </div>
    <div class="form-group">
      <label>Your Rating</label>
      <div class="star-rating" id="star-rating">
        <span class="star" data-val="1" onclick="setRating(1)">★</span>
        <span class="star" data-val="2" onclick="setRating(2)">★</span>
        <span class="star" data-val="3" onclick="setRating(3)">★</span>
        <span class="star" data-val="4" onclick="setRating(4)">★</span>
        <span class="star" data-val="5" onclick="setRating(5)">★</span>
      </div>
    </div>
    <div class="form-group">
      <label>Your Review</label>
      <textarea id="review-text" placeholder="Describe your experience with this surveyor..."></textarea>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="submitReview()" id="submit-review-btn" style="flex:1">Submit Review</button>
      <button class="btn btn-outline" onclick="closeModal('review-modal')">Cancel</button>
    </div>
  </div>
</div>

<!-- ===== UNLOCK CONFIRM MODAL ===== -->
<div class="modal-overlay" id="unlock-modal">
  <div class="modal">
    <h2 class="modal-title">🔓 Unlock Contact Details</h2>
    <p style="color:var(--ink-light);font-size:14px;margin-bottom:20px">
      You are about to unlock the customer's phone number for this survey listing. This will allow you to contact them directly.
    </p>
    <div id="unlock-listing-preview" style="background:var(--cream);border-radius:8px;padding:16px;margin-bottom:20px;border:1px solid var(--border)"></div>
    <div class="btn-group">
      <button class="btn btn-gold" onclick="confirmUnlock()" id="confirm-unlock-btn" style="flex:1">
        🔓 Confirm Unlock
      </button>
      <button class="btn btn-outline" onclick="closeModal('unlock-modal')">Cancel</button>
    </div>
  </div>
</div>

<script>
const API = '/api';
let currentUser = null;
let selectedRole = 'customer';
let selectedRating = 0;
let pendingUnlockListingId = null;
let pendingUnlockListingData = null;

// ===== HELPERS =====
function getToken() { return localStorage.getItem('token'); }
function setToken(t) { localStorage.setItem('token', t); }
function clearToken() { localStorage.removeItem('token'); localStorage.removeItem('user'); }

async function apiFetch(url, options = {}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API + url, { ...options, headers });
  const data = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, data };
}

function showAlert(containerId, msg, type = 'error') {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => { el.innerHTML = ''; }, 5000);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

// ===== AUTH =====
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-alert').innerHTML = '';
}

function selectRole(role) {
  selectedRole = role;
  document.getElementById('role-customer').classList.toggle('selected', role === 'customer');
  document.getElementById('role-surveyor').classList.toggle('selected', role === 'surveyor');
  document.getElementById('company-field').style.display = role === 'surveyor' ? 'block' : 'none';
}

async function doLogin() {
  const identifier = document.getElementById('login-identifier').value.trim();
  const password = document.getElementById('login-password').value;
  if (!identifier || !password) { showAlert('auth-alert', 'Please fill all fields'); return; }

  const btn = document.getElementById('login-btn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  const isEmail = identifier.includes('@');
  const payload = isEmail ? { email: identifier, password } : { phone: identifier, password };
  const { ok, data } = await apiFetch('/login', { method: 'POST', body: JSON.stringify(payload) });

  btn.innerHTML = 'Login'; btn.disabled = false;

  if (ok) {
    setToken(data.token);
    currentUser = data.user;
    localStorage.setItem('user', JSON.stringify(data.user));
    initApp();
  } else {
    showAlert('auth-alert', data.error || 'Login failed');
  }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const password = document.getElementById('reg-password').value;
  const company = document.getElementById('reg-company').value.trim();

  if (!name || !password) { showAlert('auth-alert', 'Name and password are required'); return; }
  if (!email && !phone) { showAlert('auth-alert', 'Provide email or phone'); return; }

  const btn = document.getElementById('register-btn');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;

  const payload = { name, email, phone, password, role: selectedRole, company };
  const { ok, data } = await apiFetch('/register', { method: 'POST', body: JSON.stringify(payload) });

  btn.innerHTML = 'Create Account'; btn.disabled = false;

  if (ok) {
    setToken(data.token);
    currentUser = data.user;
    localStorage.setItem('user', JSON.stringify(data.user));
    initApp();
  } else {
    showAlert('auth-alert', data.error || 'Registration failed');
  }
}

function doLogout() {
  clearToken();
  currentUser = null;
  document.getElementById('auth-page').classList.add('active');
  document.getElementById('app-page').classList.remove('active');
  document.getElementById('login-identifier').value = '';
  document.getElementById('login-password').value = '';
}

// ===== APP INIT =====
async function initApp() {
  document.getElementById('auth-page').classList.remove('active');
  document.getElementById('app-page').classList.add('active');

  document.getElementById('nav-username').textContent = currentUser.name;
  document.getElementById('nav-role').textContent = currentUser.role === 'customer' ? '🏠 Customer' : '📐 Surveyor';

  buildTabNav();
  if (currentUser.role === 'customer') {
    showTab('my-listings');
    loadCustomerListings();
    buildCreateListingForm();
  } else {
    showTab('browse-listings');
    loadBrowseListings();
    loadMyContacts();
    loadMyProfile();
  }
}

function buildTabNav() {
  const nav = document.getElementById('tab-nav');
  const tabs = currentUser.role === 'customer'
    ? [['my-listings', '📋 My Listings'], ['create-listing', '+ New Listing']]
    : [['browse-listings', '🔍 Browse Listings'], ['my-contacts', '📞 My Contacts'], ['my-profile', '👤 Profile']];

  nav.innerHTML = tabs.map(([id, label]) =>
    `<div class="tab-nav-item" id="tabnav-${id}" onclick="showTab('${id}')">${label}</div>`
  ).join('');
}

function showTab(tabId) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-nav-item').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tabId}`)?.classList.add('active');
  document.getElementById(`tabnav-${tabId}`)?.classList.add('active');
}

// ===== CUSTOMER: MY LISTINGS =====
async function loadCustomerListings() {
  const container = document.getElementById('tab-my-listings');
  container.innerHTML = `
    <div class="section-header">
      <h2 class="section-title">My Survey Listings</h2>
      <button class="btn btn-primary" style="width:auto" onclick="showTab('create-listing')">+ New Listing</button>
    </div>
    <div id="customer-listings-content"><p>Loading...</p></div>
  `;

  const { ok, data } = await apiFetch('/customer/dashboard');
  if (!ok) { document.getElementById('customer-listings-content').innerHTML = '<p>Failed to load.</p>'; return; }

  const { listings, stats } = data;

  let html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${stats.total_listings}</div><div class="stat-label">Total Listings</div></div>
      <div class="stat-card"><div class="stat-number">${stats.total_unlocks}</div><div class="stat-label">Surveyors Interested</div></div>
      <div class="stat-card"><div class="stat-number">${stats.contacted}</div><div class="stat-label">Contacted</div></div>
    </div>
  `;

  if (listings.length === 0) {
    html += `<div class="empty-state"><div class="empty-state-icon">📋</div><h3>No listings yet</h3><p>Create your first survey listing to find professionals.</p></div>`;
  } else {
    html += listings.map(listing => `
      <div class="card">
        <div class="card-header">
          <div>
            <h3 class="card-title">${listing.survey_type}</h3>
            <div class="unlock-count">${listing.unlocks.length} surveyor(s) interested</div>
          </div>
          <span class="tag tag-survey">${listing.survey_type.split(' ')[0]}</span>
        </div>
        <div class="card-meta">
          <div class="meta-item"><label>Area</label><span>${listing.area}</span></div>
          <div class="meta-item"><label>Date</label><span>${listing.date}</span></div>
          <div class="meta-item"><label>Time</label><span>${listing.time}</span></div>
          <div class="meta-item"><label>Phone</label><span>${listing.phone}</span></div>
        </div>
        <p style="font-size:13px;color:var(--ink-light);margin-bottom:12px">${listing.address}</p>
        ${listing.description ? `<p style="font-size:13px;color:var(--ink);margin-bottom:12px">${listing.description}</p>` : ''}

        ${listing.unlocks.length > 0 ? `
          <div style="margin-top:12px">
            <div style="font-size:13px;font-weight:600;color:var(--ink-light);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">Surveyor Responses</div>
            <div class="unlock-list">
              ${listing.unlocks.map(u => `
                <div class="unlock-item">
                  <div>
                    <div class="unlock-surveyor">${u.surveyor_name}</div>
                    <span class="tag tag-${u.status || 'pending'}">${(u.status || 'pending').replace('_', ' ')}</span>
                  </div>
                  <div class="btn-group">
                    ${u.status !== 'contacted' ? `<button class="btn btn-green btn-sm" onclick="markStatus('${u.unlock_id}', 'contacted')">✓ Mark Contacted</button>` : ''}
                    ${u.status === 'pending' ? `<button class="btn btn-red btn-sm" onclick="markStatus('${u.unlock_id}', 'not_contacted')">✗ Not Contacted</button>` : ''}
                    ${u.status === 'contacted' && !u.has_review ? `<button class="btn btn-gold btn-sm" onclick="openReviewModal('${u.unlock_id}', '${u.surveyor_name}')">⭐ Review</button>` : ''}
                    ${u.has_review ? `<span class="tag tag-contacted">✓ Reviewed</span>` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}
      </div>
    `).join('');
  }

  document.getElementById('customer-listings-content').innerHTML = html;
}

// ===== CUSTOMER: CREATE LISTING =====

    </div>
    <div class="card" style="max-width:640px">
      <div id="create-listing-alert"></div>
      <div class="form-group">
        <label>Survey Type *</label>
        <select id="cl-type">
          <option value="">Select survey type...</option>
          ${types.map(t => `<option value="${t}">${t}</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">

async function submitListing() {
  const payload = {
    survey_type: document.getElementById('cl-type').value,
    area: document.getElementById('cl-area').value.trim(),
    address: document.getElementById('cl-address').value.trim(),
    date: document.getElementById('cl-date').value,
    time: document.getElementById('cl-time').value,
    phone: document.getElementById('cl-phone').value.trim(),
    description: document.getElementById('cl-description').value.trim()
  };

  if (!payload.survey_type || !payload.area || !payload.address || !payload.date || !payload.time || !payload.phone) {
    showAlert('create-listing-alert', 'Please fill all required fields'); return;
  }

  const btn = document.getElementById('submit-listing-btn');
  btn.innerHTML = '<span class="spinner"></span> Posting...'; btn.disabled = true;

  const { ok, data } = await apiFetch('/create-listing', { method: 'POST', body: JSON.stringify(payload) });
  btn.innerHTML = '📤 Post Listing'; btn.disabled = false;

  if (ok) {
    showAlert('create-listing-alert', '✅ Listing posted successfully!', 'success');
    // Clear form
    ['cl-type','cl-area','cl-address','cl-time','cl-phone','cl-description'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    setTimeout(() => { showTab('my-listings'); loadCustomerListings(); }, 1500);
  } else {
    showAlert('create-listing-alert', data.error || 'Failed to create listing');
  }
}

// ===== CUSTOMER: MARK STATUS =====
async function markStatus(unlockId, action) {
  const endpoint = action === 'contacted' ? '/mark-contacted' : '/mark-not-contacted';
  const { ok, data } = await apiFetch(endpoint, { method: 'POST', body: JSON.stringify({ unlock_id: unlockId }) });
  if (ok) loadCustomerListings();
  else alert(data.error || 'Failed to update');
}

// ===== REVIEW =====
function openReviewModal(unlockId, surveyorName) {
  document.getElementById('review-unlock-id').value = unlockId;
  document.getElementById('review-surveyor-name').textContent = surveyorName;
  document.getElementById('review-text').value = '';
  selectedRating = 0;
  setRating(0);
  document.getElementById('review-modal-alert').innerHTML = '';
  openModal('review-modal');
}

function setRating(val) {
  selectedRating = val;
  document.querySelectorAll('#star-rating .star').forEach((s, i) => {
    s.classList.toggle('active', i < val);
  });
}

async function submitReview() {
  const unlockId = document.getElementById('review-unlock-id').value;
  const reviewText = document.getElementById('review-text').value.trim();

  if (!selectedRating) { showAlert('review-modal-alert', 'Please select a rating'); return; }
  if (!reviewText) { showAlert('review-modal-alert', 'Please write a review'); return; }

  const btn = document.getElementById('submit-review-btn');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;

  const { ok, data } = await apiFetch('/submit-review', {
    method: 'POST',
    body: JSON.stringify({ unlock_id: unlockId, rating: selectedRating, review_text: reviewText })
  });

  btn.innerHTML = 'Submit Review'; btn.disabled = false;

  if (ok) {
    closeModal('review-modal');
    loadCustomerListings();
  } else {
    showAlert('review-modal-alert', data.error || 'Failed to submit review');
  }
}

// ===== SURVEYOR: BROWSE LISTINGS =====
async function loadBrowseListings() {
  const container = document.getElementById('tab-browse-listings');
  container.innerHTML = `
    <div class="section-header">
      <h2 class="section-title">Browse Survey Listings</h2>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="listing-search" placeholder="Search by area, survey type..." oninput="filterListings()">
    </div>
    <div id="browse-listings-content">Loading...</div>
  `;

  const { ok, data } = await apiFetch('/listings');
  if (!ok) { document.getElementById('browse-listings-content').innerHTML = 'Failed to load listings.'; return; }

  window._allListings = data.listings || [];
  renderBrowseListings(window._allListings);
}

function filterListings() {
  const q = document.getElementById('listing-search').value.toLowerCase();
  const filtered = (window._allListings || []).filter(l =>
    l.area.toLowerCase().includes(q) || l.survey_type.toLowerCase().includes(q) || l.address.toLowerCase().includes(q)
  );
  renderBrowseListings(filtered);
}

function renderBrowseListings(listings) {
  const container = document.getElementById('browse-listings-content');
  if (listings.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>No listings found</h3></div>`;
    return;
  }

  container.innerHTML = listings.map(l => `
    <div class="card">
      <div class="card-header">
        <div>
          <h3 class="card-title">${l.survey_type}</h3>
          <div style="font-size:13px;color:var(--ink-light)">${l.customer_name}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="tag tag-survey">${l.survey_type.split(' ')[0]}</span>
          ${l.unlocked ? `<span class="tag tag-unlocked">🔓 Unlocked</span>` : ''}
        </div>
      </div>
      <div class="card-meta">
        <div class="meta-item"><label>Area</label><span>${l.area}</span></div>
        <div class="meta-item"><label>Date</label><span>${l.date}</span></div>
        <div class="meta-item"><label>Time</label><span>${l.time}</span></div>
        <div class="meta-item">
          <label>Phone</label>
          <span class="${l.phone ? '' : 'phone-blur'}">${l.phone || '🔒 Unlock to view'}</span>
        </div>
      </div>
      <p style="font-size:13px;color:var(--ink-light);margin-bottom:12px">${l.address}</p>
      ${l.description ? `<p style="font-size:13px;color:var(--ink);margin-bottom:12px">${l.description}</p>` : ''}
      ${l.unlocked
        ? `<div class="contact-box">
            <div class="contact-label">✅ Contact Details Unlocked</div>
            <div class="contact-phone">📞 ${l.phone}</div>
            <div style="font-size:12px;color:var(--green);margin-top:4px">Status: <strong>${(l.unlock_status || 'pending').replace('_', ' ')}</strong></div>
           </div>`
        : `<button class="btn btn-gold" onclick="initiateUnlock('${l.id}', \`${l.survey_type} — ${l.area}\`)">
             🔓 Unlock Contact Details
           </button>`
      }
    </div>
  `).join('');
}

function initiateUnlock(listingId, preview) {
  pendingUnlockListingId = listingId;
  document.getElementById('unlock-listing-preview').innerHTML = `
    <div style="font-weight:600;color:var(--ink)">${preview}</div>
    <div style="font-size:13px;color:var(--ink-light);margin-top:4px">Your subscription covers this unlock.</div>
  `;
  openModal('unlock-modal');
}

async function confirmUnlock() {
  const btn = document.getElementById('confirm-unlock-btn');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;

  const { ok, data } = await apiFetch('/unlock-contact', {
    method: 'POST',
    body: JSON.stringify({ listing_id: pendingUnlockListingId })
  });

  btn.innerHTML = '🔓 Confirm Unlock'; btn.disabled = false;

  if (ok) {
    closeModal('unlock-modal');
    // Show success with contact
    alert(`✅ Contact Unlocked!\n📞 Phone: ${data.contact.phone}\n👤 Name: ${data.contact.name}`);
    await loadBrowseListings();
    await loadMyContacts();
  } else {
    alert(data.error || 'Failed to unlock');
  }
}

// ===== SURVEYOR: MY PROFILE =====

  const { ok, data } = await apiFetch('/surveyor/profile');
  if (!ok) { container.innerHTML = 'Failed to load profile.'; return; }

  const { surveyor, reviews } = data;
  const stars = '★'.repeat(Math.round(surveyor.stats.average_rating)) + '☆'.repeat(5 - Math.round(surveyor.stats.average_rating));

  container.innerHTML = `
    <div class="section-header"><h2 class="section-title">My Profile</h2></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${surveyor.stats.unlocked_contacts}</div><div class="stat-label">Contacts Unlocked</div></div>
      <div class="stat-card"><div class="stat-number">${surveyor.stats.reviews_count}</div><div class="stat-label">Reviews</div></div>
      <div class="stat-card"><div class="stat-number">${surveyor.stats.average_rating || '—'}</div><div class="stat-label">Avg Rating</div></div>
    </div>

    <div class="card" style="max-width:640px">
      <h3 class="card-title" style="margin-bottom:16px">Profile Details</h3>
      <div id="profile-alert"></div>
      <div class="form-group">
        <label>Company / Firm</label>
        <input type="text" id="prof-company" value="${surveyor.profile?.company || ''}">
      </div>
      <div class="form-group">
        <label>Years of Experience</label>
        <input type="text" id="prof-experience" value="${surveyor.profile?.experience || ''}">
      </div>
      <button class="btn btn-primary" style="width:auto" onclick="saveProfile()">💾 Save Profile</button>
    </div>

    ${reviews.length > 0 ? `
      <div class="section-header" style="margin-top:24px"><h2 class="section-title">Customer Reviews</h2></div>
      ${reviews.map(r => `
        <div class="review-card">
          <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)} (${r.rating}/5)</div>
          <div class="review-text">${r.review_text}</div>
          <div class="review-meta">— ${r.customer_name} &bull; ${r.survey_type} &bull; ${r.created_at ? new Date(r.created_at).toLocaleDateString() : ''}</div>
        </div>
      `).join('')}
    ` : `<div class="alert alert-info" style="margin-top:16px">No reviews yet. Complete survey jobs to receive ratings.</div>`}
  `;
}

async function saveProfile() {
  const payload = {
    company: document.getElementById('prof-company').value.trim(),
    experience: document.getElementById('prof-experience').value.trim()
  };

  const { ok, data } = await apiFetch('/surveyor/profile', { method: 'PUT', body: JSON.stringify(payload) });
  if (ok) showAlert('profile-alert', '✅ Profile updated successfully!', 'success');
  else showAlert('profile-alert', data.error || 'Failed to update');
}

// ===== BOOT =====
window.onload = async function() {
  const token = getToken();
  if (token) {
    const stored = localStorage.getItem('user');
    if (stored) {
      currentUser = JSON.parse(stored);
      // Verify token is still valid
      const { ok, data } = await apiFetch('/me');
      if (ok) {
        currentUser = data;
        localStorage.setItem('user', JSON.stringify(data));
        initApp();
      } else {
        clearToken();
      }
    }
  }
};
